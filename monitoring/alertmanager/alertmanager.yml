global:
  resolve_timeout: 5m

route:
  receiver: telegram
  group_by:
    - alertname
    - instance
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 1h

receivers:
  - name: telegram
    telegram_configs:
      - bot_token: "${TELEGRAM_BOT_TOKEN}"
        chat_id: ${TELEGRAM_CHAT_ID}
        parse_mode: HTML
        send_resolved: true
        message: |
          <b>{{ .Status | toUpper }}</b> {{ .CommonLabels.alertname }}
          {{ range .Alerts }}
          Severity: {{ .Labels.severity }}
          Instance: {{ .Labels.instance }}
          {{ .Annotations.description }}
          {{ end }}
